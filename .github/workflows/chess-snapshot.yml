name: Weekly Chess Rating Snapshot

on:
  schedule:
    - cron: "0 12 * * 0"  # Every Sunday at noon UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch rating and save snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_USER_ID: ${{ secrets.SUPABASE_USER_ID }}
        run: |
          RATING=$(curl -s https://api.chess.com/pub/player/sam12678/stats \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['chess_rapid']['last']['rating'])")

          echo "Rapid rating: $RATING"

          TODAY=$(date -u +%Y-%m-%d)

          curl -s -X POST "$SUPABASE_URL/rest/v1/chess_ratings" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=ignore-duplicates" \
            -d "{\"user_id\":\"$SUPABASE_USER_ID\",\"username\":\"sam12678\",\"rating\":$RATING,\"rating_type\":\"rapid\",\"date\":\"$TODAY\"}"

          echo "Snapshot saved for $TODAY"
